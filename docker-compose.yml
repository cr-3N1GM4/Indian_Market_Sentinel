
# ==============================================================
# Indian Market Sentinel (IMS) — Docker Compose
# Orchestrates: PostgreSQL+TimescaleDB, Redis, FastAPI Backend,
#               Next.js Frontend, Celery Worker
# ==============================================================

services:
  # ----------------------------------------------------------
  # 1. PostgreSQL 15 + TimescaleDB — persistent time-series store
  # ----------------------------------------------------------
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: ims_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ims_db
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schemas.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims -d ims_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # 2. Redis 7 — caching, pub/sub for WebSocket, Celery broker
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ims_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # 3. FastAPI Backend — data pipelines, API, schedulers
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ims_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ims:${POSTGRES_PASSWORD}@postgres:5432/ims_db
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN:-}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      PROXY_LIST: ${PROXY_LIST:-}
    volumes:
      - ./watchlist.json:/app/watchlist.json:ro

  # ----------------------------------------------------------
  # 4. Next.js 14 Frontend — Bloomberg-style terminal UI
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    container_name: ims_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ----------------------------------------------------------
  # 5. Celery Worker — async LLM batch processing
  # ----------------------------------------------------------
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ims_celery
    restart: unless-stopped
    command: celery -A backend.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ims:${POSTGRES_PASSWORD}@postgres:5432/ims_db
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - ./watchlist.json:/app/watchlist.json:ro

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
